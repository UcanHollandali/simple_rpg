name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows validation
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.2
          use-dotnet: false
          include-templates: false

      - name: Verify toolchain
        shell: powershell
        run: |
          python --version
          godot --version

      - name: Environment diagnostics
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File Tools/check_environment.ps1
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Environment diagnostics exited with $LASTEXITCODE on the GitHub runner; continuing because validators and Godot tests are the CI gate."
          }
          exit 0

      - name: Content validator
        shell: powershell
        run: python Tools/validate_content.py

      - name: Asset validator
        shell: powershell
        run: python Tools/validate_assets.py

      - name: Architecture guard validator
        shell: powershell
        run: python Tools/validate_architecture_guards.py

      - name: Godot bounded tests
        shell: powershell
        run: |
          try {
            powershell -NoProfile -ExecutionPolicy Bypass -File Tools/run_godot_tests.ps1 -TimeoutSeconds 240
          }
          catch {
            if (Test-Path -LiteralPath "_godot_profile/logs" -PathType Container) {
              Get-ChildItem -LiteralPath "_godot_profile/logs" -File -Filter "*.log" | ForEach-Object {
                Write-Host "::group::Godot log $($_.Name)"
                Get-Content -LiteralPath $_.FullName -Tail 160
                Write-Host "::endgroup::"
              }
            }
            throw
          }

      - name: Portrait image diff
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File Tools/run_portrait_image_diff.ps1 -Capture -CleanOldArtifacts -TimeoutSeconds 180

      - name: Diff whitespace check
        shell: powershell
        run: git diff --check
